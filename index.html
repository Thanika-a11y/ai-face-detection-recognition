<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate AI Vision Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

.container{

width:95%;
max-width:1100px;

background:rgba(255,255,255,0.08);

padding:35px;

border-radius:30px;

backdrop-filter:blur(12px);

box-shadow:0 0 40px cyan;

text-align:center;

}

h1{

font-size:55px;

color:cyan;

margin-bottom:15px;

text-shadow:0 0 20px cyan;

}

.subtitle{

color:white;

font-size:22px;

margin-bottom:35px;

}

.upload{

display:inline-block;

padding:20px 45px;

background:cyan;

color:black;

font-size:24px;

font-weight:bold;

border-radius:20px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 20px cyan;

}

.upload:hover{

transform:scale(1.05);

background:white;

}

input{

display:none;

}

#preview{

margin-top:35px;

width:100%;

max-height:500px;

object-fit:contain;

border-radius:25px;

display:none;

box-shadow:0 0 25px cyan;

}

#loading{

display:none;

margin-top:25px;

font-size:28px;

color:cyan;

font-weight:bold;

}

.result{

display:none;

margin-top:35px;

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:25px;

color:white;

box-shadow:0 0 25px rgba(255,255,255,0.15);

}

.result h2{

font-size:40px;

margin-bottom:25px;

color:#00ffff;

}

.info{

background:rgba(0,255,255,0.12);

padding:25px;

border-radius:20px;

line-height:2.2;

font-size:22px;

border:2px solid cyan;

text-align:left;

}

.footer{

margin-top:35px;

color:white;

opacity:0.7;

font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Ultimate AI Vision Analyzer</h1>

<p class="subtitle">

Detect Birds, Humans, Tigers, Animals & Objects ✨

</p>

<label for="fileInput" class="upload">

📤 Upload Image

</label>

<input
type="file"
id="fileInput"
accept="image/*">

<div id="loading">

🔍 AI Scanning Image...

</div>

<img id="preview">

<div class="result" id="result"></div>

<div class="footer">

✨ Advanced AI Detection • Living / Non-Living • Emotion Analysis

</div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const loading =
document.getElementById("loading");

let model;

async function startAI(){

loading.style.display = "block";

loading.innerHTML =
"🧠 Loading AI Model...";

model =
await mobilenet.load();

loading.style.display = "none";

console.log("AI Loaded");

}

startAI();

fileInput.addEventListener("change", async function(){

const file =
this.files[0];

if(!file) return;

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

loading.style.display =
"block";

loading.innerHTML =
"🔍 AI Scanning Image...";

preview.onload =
async function(){

const predictions =
await model.classify(preview);

const top =
predictions[0];

const name =
top.className.toLowerCase();

const confidence =
(top.probability * 100)
.toFixed(2);

let category = "";
let living = "";
let emotion = "";
let description = "";

if(name.includes("bird")){

category = "🐦 Bird";

living = "✅ Living Being";

emotion =
"🐤 Calm / Natural";

description =
"AI identified a bird species.";

}

else if(name.includes("tiger")){

category = "🐯 Tiger";

living = "✅ Wild Animal";

emotion =
"🔥 Aggressive";

description =
"AI identified a tiger.";

}

else if(

name.includes("person") ||
name.includes("man") ||
name.includes("woman")

){

category = "👤 Human";

living = "✅ Living Human";

emotion =
"😊 Human Emotion Estimated";

description =
"AI identified a human.";

}

else if(

name.includes("dog") ||
name.includes("cat") ||
name.includes("lion") ||
name.includes("horse")

){

category = "🐾 Animal";

living = "✅ Living Animal";

emotion =
"😺 Animal Mood Estimated";

description =
"AI identified an animal.";

}

else{

category = "📦 Object";

living = "❌ Non-Living";

emotion =
"🚫 No Emotion";

description =
"AI identified a non-living object.";

}

loading.style.display =
"none";

result.style.display =
"block";

result.innerHTML =

`

<h2>🔥 AI Analysis Result</h2>

<div class="info">

<p>🧠 Prediction:
<b>${top.className}</b></p>

<p>🎯 Confidence:
<b>${confidence}%</b></p>

<p>📌 Category:
<b>${category}</b></p>

<p>🌍 Status:
<b>${living}</b></p>

<p>😊 Emotion:
<b>${emotion}</b></p>

<p>💡 Description:
<b>${description}</b></p>

<p>⚡ AI Recognition:
<b>Successful</b></p>

</div>

`;

};

});

</script>

</body>

</html>
