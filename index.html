<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Face Detection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

.container{

width:90%;
max-width:900px;

background:rgba(255,255,255,0.1);

padding:40px;

border-radius:30px;

backdrop-filter:blur(10px);

box-shadow:0 0 40px cyan;

text-align:center;

}

h1{

font-size:55px;

color:cyan;

margin-bottom:10px;

text-shadow:0 0 20px cyan;

}

p{

color:white;

margin-bottom:30px;

font-size:20px;

}

.upload{

display:inline-block;

padding:20px 40px;

background:cyan;

color:black;

font-size:25px;

font-weight:bold;

border-radius:20px;

cursor:pointer;

box-shadow:0 0 20px cyan;

transition:0.3s;

}

.upload:hover{

transform:scale(1.05);

background:white;

}

input{

display:none;

}

img{

margin-top:30px;

width:100%;
max-height:500px;

object-fit:contain;

border-radius:20px;

display:none;

box-shadow:0 0 20px cyan;

}

.result{

margin-top:30px;

padding:25px;

border-radius:20px;

background:rgba(255,255,255,0.1);

color:white;

font-size:22px;

display:none;

box-shadow:0 0 20px rgba(255,255,255,0.2);

}

.face-box{

margin-top:20px;

padding:15px;

background:rgba(0,255,255,0.15);

border:2px solid cyan;

border-radius:15px;

}

button{

margin-top:20px;

padding:15px 30px;

border:none;

border-radius:15px;

background:cyan;

font-size:18px;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 15px cyan;

transition:0.3s;

}

button:hover{

background:white;

transform:scale(1.05);

}

.footer{

margin-top:30px;

color:white;

opacity:0.7;

}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Face Detection</h1>

<p>

Upload image and simulate intelligent AI face recognition ✨

</p>

<label for="fileInput" class="upload">

📤 Upload Image

</label>

<input
type="file"
id="fileInput"
accept="image/*">

<img id="preview">

<div class="result" id="result">

</div>

<div class="footer">

✨ Advanced AI Recognition System

</div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

fileInput.addEventListener("change", ()=>{

const file =
fileInput.files[0];

if(file){

preview.src =
URL.createObjectURL(file);

preview.style.display = "block";

result.style.display = "block";

result.innerHTML =

`

<h2>✅ Face Detection Successful</h2>

<div class="face-box">

<p>👤 Human face detected in image</p>

<p>😊 Emotion Analysis: Happy</p>

<p>🎯 Confidence Level: 98%</p>

<p>🧠 AI Recognition: Successful</p>

<p>📸 Image Quality: Excellent</p>

<p>⚡ Processing Speed: Fast</p>

<p>🔐 Security Status: Verified</p>

</div>

<button onclick="showMore()">

🔍 View Detailed Report

</button>

`;

}

});

function showMore(){

alert(

"AI REPORT\n\n" +

"✔ Face Detected\n" +

"✔ Human Identified\n" +

"✔ Emotion Recognized\n" +

"✔ High Confidence Match\n" +

"✔ AI Scan Completed Successfully"

);

}

</script>

</body>

</html>
