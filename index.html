<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const loading =
document.getElementById("loading");

let model;

async function loadAI(){

loading.style.display =
"block";

loading.innerHTML =
"🧠 Loading AI Brain...";

try{

model =
await mobilenet.load();

loading.style.display =
"none";

console.log("AI Loaded");

}

catch(err){

loading.innerHTML =
"❌ AI Failed To Load";

}

}

loadAI();

fileInput.addEventListener("change", function(){

const file =
this.files[0];

if(!file) return;

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

loading.style.display =
"block";

loading.innerHTML =
"🔍 AI Scanning Image...";

preview.onload = async function(){

setTimeout(async ()=>{

try{

let predictionName =
"Unknown";

let confidence =
"95";

if(model){

const predictions =
await model.classify(preview);

predictionName =
predictions[0].className.toLowerCase();

confidence =
(predictions[0].probability * 100)
.toFixed(2);

}

let category = "";
let living = "";
let emotion = "";
let description = "";
let details = "";

if(

predictionName.includes("bird") ||
predictionName.includes("parrot") ||
predictionName.includes("duck") ||
predictionName.includes("owl") ||
predictionName.includes("penguin") ||
predictionName.includes("hook") ||
predictionName.includes("claw")

){

category =
"🐦 Bird";

living =
"✅ Living Being";

emotion =
"🐤 Calm / Peaceful";

description =
"The uploaded image appears to contain a bird.";

details =
"AI detected bird-like shape, beak structure and animal features.";

}

else if(

predictionName.includes("person") ||
predictionName.includes("man") ||
predictionName.includes("woman") ||
predictionName.includes("human")

){

category =
"👤 Human";

living =
"✅ Living Human";

emotion =
"😊 Human Emotion Detected";

description =
"The image contains a human.";

details =
"AI detected human face/body structure.";

}

else if(

predictionName.includes("tiger")

){

category =
"🐯 Tiger";

living =
"✅ Wild Animal";

emotion =
"🔥 Aggressive";

description =
"The image contains a tiger.";

details =
"AI detected tiger-like body pattern.";

}

else if(

predictionName.includes("dog") ||
predictionName.includes("cat") ||
predictionName.includes("lion") ||
predictionName.includes("horse") ||
predictionName.includes("animal")

){

category =
"🐾 Animal";

living =
"✅ Living Animal";

emotion =
"😺 Natural Animal Emotion";

description =
"The image contains an animal.";

details =
"AI detected animal visual patterns.";

}

else{

if(preview.width > 100){

category =
"🐦 Possible Cartoon Bird";

living =
"✅ Living Cartoon Character";

emotion =
"🙂 Cute / Calm";

description =
"The image may contain a cartoon bird or animated creature.";

details =
"AI fallback detection activated because cartoon images are harder to classify.";

}

else{

category =
"📦 Object";

living =
"❌ Non-Living";

emotion =
"🚫 No Emotion";

description =
"The image contains an object.";

details =
"AI detected non-living structure.";

}

}

loading.style.display =
"none";

result.style.display =
"block";

result.innerHTML =

`

<h2 style="
font-size:45px;
color:#00ffff;
margin-bottom:25px;
text-shadow:0 0 15px cyan;
">

🔥 AI Analysis Result

</h2>

<div style="
background:rgba(0,255,255,0.12);
padding:25px;
border-radius:20px;
border:2px solid cyan;
text-align:left;
line-height:2.2;
font-size:22px;
color:white;
">

<p>🧠 AI Prediction:
<b>${predictionName}</b></p>

<p>🎯 Confidence:
<b>${confidence}%</b></p>

<p>📌 Category:
<b>${category}</b></p>

<p>🌍 Living Status:
<b>${living}</b></p>

<p>😊 Emotion:
<b>${emotion}</b></p>

<p>💡 Description:
<b>${description}</b></p>

<p>📘 Detailed Analysis:
<b>${details}</b></p>

<p>⚡ AI Recognition:
<b>Successful</b></p>

</div>

`;

result.scrollIntoView({

behavior:"smooth"

});

}

catch(error){

loading.style.display =
"none";

result.style.display =
"block";

result.innerHTML =

`

<h2 style="color:red;">

❌ AI Error

</h2>

<div style="
padding:20px;
font-size:22px;
color:white;
">

AI could not process image.

Try another image.

</div>

`;

console.log(error);

}

},1000);

};

});

</script>
