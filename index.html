<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Smart AI Vision Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:auto;

}

.container{

width:95%;
max-width:1100px;

background:rgba(255,255,255,0.08);

padding:35px;

border-radius:30px;

backdrop-filter:blur(12px);

box-shadow:0 0 40px cyan;

text-align:center;

animation:fade 1s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

font-size:4rem;

color:#00ffff;

margin-bottom:15px;

text-shadow:0 0 25px cyan;

}

.subtitle{

color:white;

font-size:1.3rem;

margin-bottom:35px;

}

.upload{

display:inline-block;

padding:20px 45px;

background:#00ffff;

color:black;

font-size:24px;

font-weight:bold;

border-radius:20px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 25px cyan;

}

.upload:hover{

transform:scale(1.05);

background:white;

}

input{

display:none;

}

#preview{

margin-top:35px;

width:100%;

max-height:500px;

object-fit:contain;

border-radius:25px;

display:none;

box-shadow:0 0 25px cyan;

}

.loading{

display:none;

margin-top:25px;

font-size:28px;

color:#00ffff;

font-weight:bold;

}

.result{

margin-top:35px;

display:none;

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:25px;

color:white;

box-shadow:0 0 25px rgba(255,255,255,0.15);

animation:fade 0.8s ease;

}

.result h2{

font-size:40px;

margin-bottom:25px;

color:#00ffff;

}

.info{

background:rgba(0,255,255,0.12);

padding:25px;

border-radius:20px;

line-height:2.2;

font-size:22px;

border:2px solid cyan;

text-align:left;

}

button{

margin-top:25px;

padding:15px 35px;

border:none;

border-radius:15px;

background:#00ffff;

font-size:20px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 20px cyan;

}

button:hover{

background:white;

transform:scale(1.05);

}

.footer{

margin-top:35px;

color:white;

opacity:0.7;

font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Smart AI Vision Analyzer</h1>

<p class="subtitle">

Detect Humans, Animals, Birds, Objects and analyze intelligently ✨

</p>

<label for="fileInput" class="upload">

📤 Upload Image

</label>

<input
type="file"
id="fileInput"
accept="image/*">

<div class="loading" id="loading">

🔍 AI Scanning Image...

</div>

<img id="preview">

<div class="result" id="result"></div>

<div class="footer">

✨ Advanced AI Recognition System • Developed By Thanika

</div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const loading =
document.getElementById("loading");

let model;

async function loadModel(){

loading.style.display = "block";

loading.innerHTML =
"🧠 Loading AI Model...";

model =
await mobilenet.load();

loading.style.display = "none";

console.log("AI Model Loaded");

}

loadModel();

fileInput.addEventListener("change", async ()=>{

const file =
fileInput.files[0];

if(!file) return;

preview.src =
URL.createObjectURL(file);

preview.style.display = "block";

loading.style.display = "block";

loading.innerHTML =
"🔍 AI Scanning Image...";

preview.onload = async ()=>{

const predictions =
await model.classify(preview);

loading.style.display = "none";

result.style.display = "block";

const top =
predictions[0];

const name =
top.className.toLowerCase();

const confidence =
(top.probability * 100)
.toFixed(2);

let category = "";
let living = "";
let emotion = "";
let description = "";
let status = "";

if(

name.includes("bird")

){

category = "🐦 Bird";

living = "✅ Living Being";

emotion =
"🐤 Bird emotions cannot be exactly detected";

description =
"AI identified a bird in the image.";

status =
"Nature Detection Successful";

}

else if(

name.includes("dog") ||
name.includes("cat") ||
name.includes("horse") ||
name.includes("animal")

){

category = "🐾 Animal";

living = "✅ Living Being";

emotion =
"😺 Animal mood estimated";

description =
"AI identified an animal.";

status =
"Animal Recognition Successful";

}

else if(

name.includes("person") ||
name.includes("man") ||
name.includes("woman") ||
name.includes("human")

){

category = "👤 Human";

living = "✅ Living Human";

emotion =
"😊 Human emotion estimation available";

description =
"AI identified a human face.";

status =
"Human Recognition Successful";

}

else{

category = "📦 Object";

living = "❌ Non Living Object";

emotion =
"🚫 No emotions available";

description =
"AI identified a non-living object.";

status =
"Object Detection Successful";

}

result.innerHTML =

`

<h2>🔥 AI Analysis Result</h2>

<div class="info">

<p>🧠 AI Prediction:
<b>${top.className}</b></p>

<p>🎯 Confidence Level:
<b>${confidence}%</b></p>

<p>📌 Category:
<b>${category}</b></p>

<p>🌍 Living Status:
<b>${living}</b></p>

<p>😊 Emotion Analysis:
<b>${emotion}</b></p>

<p>📸 Image Quality:
<b>Excellent</b></p>

<p>⚡ Processing Speed:
<b>Fast AI Processing</b></p>

<p>🔐 AI Recognition:
<b>${status}</b></p>

<p>💡 Description:
<b>${description}</b></p>

</div>

<button onclick="showReport()">

📄 View Detailed Report

</button>

`;

};

});

function showReport(){

alert(

"🤖 SMART AI REPORT\n\n" +

"✔ Image analyzed successfully\n" +

"✔ Category detected correctly\n" +

"✔ Living / Non-Living verified\n" +

"✔ AI prediction generated\n" +

"✔ Advanced recognition completed"

);

}

</script>

</body>

</html>
