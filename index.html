<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Face Detection</title>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .container{
      text-align:center;
      background:rgba(255,255,255,0.08);
      padding:20px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,255,255,0.3);
    }

    h1{
      color:#00eaff;
      margin-bottom:20px;
    }

    video{
      border-radius:20px;
      border:3px solid #00eaff;
    }

    canvas{
      position:absolute;
    }

    .status{
      margin-top:15px;
      color:lime;
      font-size:18px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>AI Face Detection System</h1>

  <div style="position:relative;">
    <video id="video" width="720" height="560" autoplay muted></video>
  </div>

  <div class="status" id="status">
    Loading AI Models...
  </div>
</div>

</body>
</html>
