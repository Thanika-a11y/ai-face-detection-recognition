<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Ultimate AI Vision Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);

min-height:100vh;

padding:20px;

display:flex;
justify-content:center;
align-items:flex-start;

}

.container{

width:95%;
max-width:1100px;

background:rgba(255,255,255,0.08);

padding:35px;

border-radius:30px;

backdrop-filter:blur(12px);

box-shadow:0 0 40px cyan;

text-align:center;

}

h1{

font-size:60px;

color:#00ffff;

margin-bottom:15px;

text-shadow:0 0 20px cyan;

}

.subtitle{

font-size:24px;

color:white;

margin-bottom:35px;

}

.upload{

display:inline-block;

padding:22px 50px;

background:#00ffff;

color:black;

font-size:26px;

font-weight:bold;

border-radius:20px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 25px cyan;

}

.upload:hover{

transform:scale(1.05);

background:white;

}

input{
display:none;
}

#loading{

display:none;

margin-top:30px;

font-size:32px;

font-weight:bold;

color:#00ffff;

}

#preview{

margin-top:35px;

width:100%;

max-height:450px;

object-fit:contain;

border-radius:25px;

display:none;

box-shadow:0 0 25px cyan;

}

.result{

display:none;

margin-top:35px;

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:25px;

box-shadow:0 0 25px rgba(255,255,255,0.15);

color:white;

}

.result h2{

font-size:45px;

margin-bottom:25px;

color:#00ffff;

text-shadow:0 0 15px cyan;

}

.info{

background:rgba(0,255,255,0.12);

padding:25px;

border-radius:20px;

border:2px solid cyan;

text-align:left;

line-height:2.3;

font-size:23px;

}

.footer{

margin-top:35px;

font-size:18px;

color:white;

opacity:0.7;

}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Ultimate AI Vision Analyzer</h1>

<p class="subtitle">

Detect Birds, Humans, Tigers, Animals & Objects ✨

</p>

<label for="fileInput" class="upload">

📤 Upload Image

</label>

<input
type="file"
id="fileInput"
accept="image/*">

<div id="loading">

🔍 AI Scanning Image...

</div>

<img id="preview">

<div class="result" id="result"></div>

<div class="footer">

✨ Advanced AI Detection • Living / Non-Living • Expression Analyzer

</div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const loading =
document.getElementById("loading");

let model;

async function loadAI(){

loading.style.display =
"block";

loading.innerHTML =
"🧠 Loading AI Model...";

model =
await mobilenet.load();

loading.style.display =
"none";

console.log("AI Loaded Successfully");

}

loadAI();

fileInput.addEventListener("change", async function(){

const file =
this.files[0];

if(!file) return;

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

loading.style.display =
"block";

loading.innerHTML =
"🔍 AI Scanning Image...";

preview.onload = async function(){

setTimeout(async ()=>{

try{

const predictions =
await model.classify(preview);

const top =
predictions[0];

const name =
top.className.toLowerCase();

const confidence =
(top.probability * 100)
.toFixed(2);

let category = "";
let living = "";
let emotion = "";
let description = "";
let details = "";

if(

name.includes("bird") ||
name.includes("parrot") ||
name.includes("duck") ||
name.includes("owl") ||
name.includes("penguin") ||
name.includes("hook") ||
name.includes("claw")

){

category = "🐦 Bird";

living = "✅ Living Bird";

emotion =
"🐤 Calm / Natural";

description =
"This image appears to contain a bird or bird-like structure.";

details =
"Birds are warm-blooded living creatures with feathers, wings and beaks. The AI detected features similar to bird anatomy.";

}

else if(

name.includes("person") ||
name.includes("man") ||
name.includes("woman") ||
name.includes("human")

){

category = "👤 Human";

living = "✅ Living Human";

emotion =
"😊 Human Emotion Estimated";

description =
"This image contains a human face or human body.";

details =
"Humans are highly intelligent living beings. AI detected human facial/body patterns from the uploaded image.";

}

else if(

name.includes("tiger")

){

category = "🐯 Tiger";

living = "✅ Wild Animal";

emotion =
"🔥 Aggressive / Powerful";

description =
"This image appears to contain a tiger.";

details =
"Tigers are powerful wild animals belonging to the cat family. AI recognized tiger-like fur/body patterns.";

}

else if(

name.includes("dog") ||
name.includes("cat") ||
name.includes("lion") ||
name.includes("horse") ||
name.includes("animal")

){

category = "🐾 Animal";

living = "✅ Living Animal";

emotion =
"😺 Natural Animal Emotion";

description =
"This image contains an animal.";

details =
"Animals are living organisms capable of movement and behavior. AI detected animal-like visual patterns.";

}

else{

category = "📦 Object";

living = "❌ Non-Living Object";

emotion =
"🚫 No Emotion";

description =
"This image contains a non-living object.";

details =
"The uploaded image appears to be an object or artificial item instead of a living being.";

}

loading.style.display =
"none";

result.style.display =
"block";

result.innerHTML =

`

<h2>🔥 AI Analysis Result</h2>

<div class="info">

<p>🧠 AI Prediction:
<b>${top.className}</b></p>

<p>🎯 Confidence Level:
<b>${confidence}%</b></p>

<p>📌 Category:
<b>${category}</b></p>

<p>🌍 Living Status:
<b>${living}</b></p>

<p>😊 Expression:
<b>${emotion}</b></p>

<p>💡 Description:
<b>${description}</b></p>

<p>📘 Detailed Analysis:
<b>${details}</b></p>

<p>⚡ AI Recognition:
<b>Successful</b></p>

</div>

`;

result.scrollIntoView({

behavior:"smooth"

});

}

catch(error){

loading.style.display =
"none";

result.style.display =
"block";

result.innerHTML =

`

<h2>❌ AI Error</h2>

<div class="info">

<p>Unable to analyze image.</p>

<p>Try another image.</p>

</div>

`;

}

},1000);

};

});

</script>

</body>

</html>
