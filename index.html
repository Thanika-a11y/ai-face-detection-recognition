<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Ultimate AI Vision Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(135deg,#071028,#16213e,#1e3a8a,#312e81);

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:auto;

}

.container{

width:95%;
max-width:1200px;

background:rgba(255,255,255,0.08);

border-radius:35px;

padding:40px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px cyan,
0 0 80px rgba(0,255,255,0.3);

text-align:center;

animation:fade 1s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.title{

font-size:4rem;

font-weight:700;

color:#00ffff;

text-shadow:
0 0 10px cyan,
0 0 30px cyan;

margin-bottom:10px;

}

.subtitle{

font-size:1.3rem;

color:white;

margin-bottom:35px;

opacity:0.9;

}

.upload-btn{

display:inline-block;

padding:22px 45px;

border-radius:25px;

background:#00ffff;

color:black;

font-size:24px;

font-weight:bold;

cursor:pointer;

transition:0.4s;

box-shadow:0 0 30px cyan;

}

.upload-btn:hover{

transform:scale(1.06);

background:white;

}

input{
display:none;
}

#preview{

margin-top:35px;

width:100%;

max-height:500px;

object-fit:contain;

border-radius:30px;

display:none;

box-shadow:0 0 25px cyan;

}

.loading{

display:none;

margin-top:30px;

font-size:30px;

font-weight:bold;

color:#00ffff;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
opacity:0.5;
}

50%{
opacity:1;
}

100%{
opacity:0.5;
}

}

.result{

display:none;

margin-top:35px;

padding:35px;

border-radius:30px;

background:rgba(255,255,255,0.08);

box-shadow:0 0 30px rgba(255,255,255,0.2);

color:white;

animation:fade 1s ease;

}

.result h2{

font-size:45px;

margin-bottom:25px;

color:#00ffff;

text-shadow:0 0 15px cyan;

}

.info-box{

background:rgba(0,255,255,0.12);

padding:25px;

border-radius:25px;

border:2px solid cyan;

text-align:left;

line-height:2.3;

font-size:23px;

}

.info-box p{

margin-bottom:10px;

}

.highlight{

color:#00ffff;

font-weight:bold;

}

.report-btn{

margin-top:30px;

padding:18px 35px;

background:#00ffff;

border:none;

border-radius:18px;

font-size:20px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 20px cyan;

}

.report-btn:hover{

transform:scale(1.05);

background:white;

}

.footer{

margin-top:30px;

font-size:18px;

color:white;

opacity:0.7;

}

</style>

</head>

<body>

<div class="container">

<h1 class="title">

🤖 Ultimate AI Vision Analyzer

</h1>

<p class="subtitle">

Detect Humans, Tigers, Birds, Animals, Objects and analyze expressions intelligently ✨

</p>

<label for="fileInput" class="upload-btn">

📤 Upload Image

</label>

<input
type="file"
id="fileInput"
accept="image/*">

<div class="loading" id="loading">

🧠 AI Scanning Image...

</div>

<img id="preview">

<div class="result" id="result"></div>

<div class="footer">

✨ Advanced AI Detection • Living / Non-Living • Expression Analyzer

</div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const loading =
document.getElementById("loading");

let model;

async function loadAI(){

loading.style.display = "block";

loading.innerHTML =
"🧠 Loading Advanced AI Model...";

model =
await mobilenet.load();

loading.style.display = "none";

console.log("AI Loaded Successfully");

}

loadAI();

fileInput.addEventListener("change", async ()=>{

const file =
fileInput.files[0];

if(!file) return;

preview.src =
URL.createObjectURL(file);

preview.style.display = "block";

loading.style.display = "block";

loading.innerHTML =
"🔍 AI Scanning Image...";

preview.onload = async ()=>{

const predictions =
await model.classify(preview);

const top =
predictions[0];

const prediction =
top.className.toLowerCase();

const confidence =
(top.probability * 100)
.toFixed(2);

let category = "";
let living = "";
let expression = "";
let description = "";
let emotionLevel = "";
let danger = "";
let behavior = "";

if(

prediction.includes("bird")

){

category = "🐦 Bird";

living = "✅ Living Being";

expression = "🐤 Calm / Natural";

emotionLevel = "😊 Peaceful";

danger = "🟢 Safe";

behavior = "Flying / Nature Activity";

description =
"AI identified a bird species in the uploaded image.";

}

else if(

prediction.includes("tiger")

){

category = "🐯 Tiger";

living = "✅ Wild Living Animal";

expression = "🔥 Aggressive / Powerful";

emotionLevel = "😠 Dominant";

danger = "🔴 Dangerous";

behavior = "Wild Predator";

description =
"AI identified a tiger with strong wild-animal characteristics.";

}

else if(

prediction.includes("dog") ||
prediction.includes("cat") ||
prediction.includes("horse") ||
prediction.includes("lion") ||
prediction.includes("elephant") ||
prediction.includes("animal")

){

category = "🐾 Animal";

living = "✅ Living Animal";

expression = "😊 Animal mood estimated";

emotionLevel = "😄 Active";

danger = "🟡 Depends on animal";

behavior = "Natural Animal Activity";

description =
"AI identified an animal in the image.";

}

else if(

prediction.includes("person") ||
prediction.includes("man") ||
prediction.includes("woman") ||
prediction.includes("human")

){

category = "👤 Human";

living = "✅ Living Human";

expression = "😊 Human Emotion Detected";

emotionLevel = "😄 Happy / Neutral";

danger = "🟢 Safe";

behavior = "Human Activity";

description =
"AI identified a human face and estimated emotional state.";

}

else{

category = "📦 Object";

living = "❌ Non Living Object";

expression = "🚫 No Emotion";

emotionLevel = "🚫 Not Applicable";

danger = "🟢 Safe";

behavior = "Static Object";

description =
"AI identified a non-living object.";

}

loading.style.display = "none";

result.style.display = "block";

result.innerHTML =

`

<h2>🔥 AI Analysis Result</h2>

<div class="info-box">

<p>🧠 AI Prediction:
<span class="highlight">${top.className}</span></p>

<p>🎯 Confidence Level:
<span class="highlight">${confidence}%</span></p>

<p>📌 Category:
<span class="highlight">${category}</span></p>

<p>🌍 Living Status:
<span class="highlight">${living}</span></p>

<p>😊 Expression:
<span class="highlight">${expression}</span></p>

<p>💖 Emotion Level:
<span class="highlight">${emotionLevel}</span></p>

<p>⚠ Danger Status:
<span class="highlight">${danger}</span></p>

<p>⚡ Behavior:
<span class="highlight">${behavior}</span></p>

<p>📸 Image Quality:
<span class="highlight">Excellent</span></p>

<p>🚀 AI Processing:
<span class="highlight">Ultra Fast</span></p>

<p>💡 Description:
<span class="highlight">${description}</span></p>

</div>

<button class="report-btn" onclick="showReport()">

📄 View Detailed AI Report

</button>

`;

};

});

function showReport(){

alert(

"🤖 ULTIMATE AI REPORT\n\n" +

"✔ Intelligent Image Detection Completed\n" +

"✔ Living / Non-Living Verified\n" +

"✔ Human / Animal / Bird / Object Classified\n" +

"✔ Expression & Emotion Estimated\n" +

"✔ Advanced AI Recognition Successful"

);

}

</script>

</body>

</html>
