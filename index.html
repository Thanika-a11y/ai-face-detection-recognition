<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Face Detection System</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Face API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:'';
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle,#00ffff22 2px,transparent 2px),
        radial-gradient(circle,#9d00ff22 2px,transparent 2px);
    background-size:50px 50px;
    animation:moveBg 25s linear infinite;
    z-index:-1;
}

@keyframes moveBg{
    0%{transform:translate(0,0);}
    100%{transform:translate(100px,100px);}
}

header{
    text-align:center;
    padding:20px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:3rem;
    background:linear-gradient(90deg,#00ffff,#9d00ff);
    -webkit-background-clip:text;
    color:transparent;
    text-shadow:0 0 20px #00ffff;
}

header p{
    color:#aaa;
    margin-top:10px;
    letter-spacing:2px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

.video-box{
    position:relative;
    width:900px;
    max-width:95%;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,255,255,0.3);
}

video{
    width:100%;
    border-radius:25px;
    transform:scaleX(-1);
}

canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.scan-line{
    position:absolute;
    width:100%;
    height:4px;
    background:linear-gradient(90deg,transparent,#00ffff,transparent);
    animation:scan 3s linear infinite;
    box-shadow:0 0 20px #00ffff;
}

@keyframes scan{
    0%{top:0;}
    100%{top:100%;}
}

.controls{
    margin-top:20px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

button{
    padding:14px 25px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00ffff,#9d00ff);
    color:white;
    font-family:'Orbitron';
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 20px rgba(0,255,255,0.4);
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 35px rgba(0,255,255,0.8);
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    width:90%;
    margin-top:25px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,255,255,0.15);
}

.card h3{
    color:#00ffff;
    margin-bottom:10px;
}

.card span{
    font-size:2rem;
    font-weight:bold;
}

.status{
    margin-top:20px;
    background:rgba(255,255,255,0.05);
    padding:15px 25px;
    border-radius:15px;
    color:#00ffff;
}

.loading{
    position:fixed;
    width:100%;
    height:100%;
    background:#050816;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loader{
    width:120px;
    height:120px;
    border:6px solid transparent;
    border-top:6px solid #00ffff;
    border-bottom:6px solid #9d00ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.loading h2{
    margin-top:20px;
    font-family:'Orbitron';
    color:#00ffff;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
}
</style>
</head>

<body>

<div class="loading" id="loading">
    <div class="loader"></div>
    <h2>Loading AI Models...</h2>
</div>

<header>
    <h1>AI FACE DETECTION SYSTEM</h1>
    <p>Powered by Advanced Deep Learning</p>
</header>

<div class="container">

    <div class="video-box">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="scan-line"></div>
    </div>

    <div class="controls">
        <button id="startBtn">START CAMERA</button>
        <button id="stopBtn">STOP CAMERA</button>
        <button id="captureBtn">CAPTURE</button>
    </div>

    <div class="stats">
        <div class="card">
            <h3>Faces</h3>
            <span id="faces">0</span>
        </div>

        <div class="card">
            <h3>Emotion</h3>
            <span id="emotion">-</span>
        </div>

        <div class="card">
            <h3>Confidence</h3>
            <span id="confidence">0%</span>
        </div>

        <div class="card">
            <h3>FPS</h3>
            <span id="fps">0</span>
        </div>
    </div>

    <div class="status" id="status">
        Initializing AI...
    </div>

</div>

<footer>
    © 2026 Futuristic AI Face Detection
</footer>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const facesEl = document.getElementById('faces');
const emotionEl = document.getElementById('emotion');
const confidenceEl = document.getElementById('confidence');
const fpsEl = document.getElementById('fps');
const statusEl = document.getElementById('status');

let stream;

/* MODEL URL */
const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';

/* LOAD MODELS */
async function loadModels(){

    statusEl.innerText = 'Loading AI Models...';

    await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
        faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);

    document.getElementById('loading').style.display='none';

    statusEl.innerText = 'AI Models Loaded Successfully';

    startCamera();
}

/* START CAMERA */
async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });

        video.srcObject = stream;

        statusEl.innerText = 'Camera Started';

    }catch(err){

        statusEl.innerText = 'Camera Permission Denied';

        console.error(err);
    }
}

/* STOP CAMERA */
function stopCamera(){

    if(stream){

        stream.getTracks().forEach(track=>track.stop());

        statusEl.innerText = 'Camera Stopped';
    }
}

/* DETECTION */
video.addEventListener('play',()=>{

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    setInterval(async()=>{

        const start = performance.now();

        const detections = await faceapi
        .detectAllFaces(
            video,
            new faceapi.TinyFaceDetectorOptions()
        )
        .withFaceLandmarks()
        .withFaceExpressions()
        .withAgeAndGender();

        ctx.clearRect(0,0,canvas.width,canvas.height);

        facesEl.innerText = detections.length;

        detections.forEach(detection=>{

            const box = detection.detection.box;

            const expressions = detection.expressions;

            const emotion = Object.keys(expressions).reduce((a,b)=>
                expressions[a] > expressions[b] ? a : b
            );

            const confidence = Math.round(
                detection.detection.score * 100
            );

            emotionEl.innerText = emotion;

            confidenceEl.innerText = confidence + '%';

            /* Glow Box */
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';

            ctx.strokeRect(
                box.x,
                box.y,
                box.width,
                box.height
            );

            /* Label */
            ctx.font = '18px Orbitron';
            ctx.fillStyle = '#00ffff';

            ctx.fillText(
                `${detection.gender} | Age:${Math.round(detection.age)} | ${emotion}`,
                box.x,
                box.y - 10
            );

            /* Pulse Circle */
            ctx.beginPath();

            ctx.arc(
                box.x + box.width/2,
                box.y + box.height/2,
                box.width/1.5,
                0,
                Math.PI*2
            );

            ctx.strokeStyle='rgba(0,255,255,0.2)';

            ctx.stroke();
        });

        const end = performance.now();

        fpsEl.innerText = Math.round(1000/(end-start));

    },100);
});

/* BUTTONS */
document.getElementById('startBtn').addEventListener('click',startCamera);

document.getElementById('stopBtn').addEventListener('click',stopCamera);

/* CAPTURE */
document.getElementById('captureBtn').addEventListener('click',()=>{

    const link = document.createElement('a');

    link.download = 'face-detection.png';

    link.href = canvas.toDataURL();

    link.click();

    statusEl.innerText = 'Screenshot Captured';
});

/* INIT */
loadModels();
</script>

</body>
</html>
