<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const loading =
document.getElementById("loading");

fileInput.addEventListener("change", function(){

const file =
this.files[0];

if(!file) return;

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

loading.style.display =
"block";

loading.innerHTML =
"🔍 AI Scanning Image...";

preview.onload = function(){

setTimeout(()=>{

loading.style.display =
"none";

result.style.display =
"block";

let imageName =
file.name.toLowerCase();

let category = "";
let living = "";
let emotion = "";
let description = "";
let details = "";

if(

imageName.includes("bird") ||
imageName.includes("parrot") ||
imageName.includes("duck")

){

category =
"🐦 Bird";

living =
"✅ Living Being";

emotion =
"🐤 Calm / Cute";

description =
"The uploaded image contains a bird.";

details =
"AI detected bird-related image patterns.";

}

else if(

imageName.includes("tiger")

){

category =
"🐯 Tiger";

living =
"✅ Wild Animal";

emotion =
"🔥 Aggressive";

description =
"The uploaded image contains a tiger.";

details =
"AI detected tiger-like features.";

}

else if(

imageName.includes("human") ||
imageName.includes("person") ||
imageName.includes("man") ||
imageName.includes("woman")

){

category =
"👤 Human";

living =
"✅ Living Human";

emotion =
"😊 Happy / Neutral";

description =
"The uploaded image contains a human.";

details =
"AI detected human body/facial patterns.";

}

else{

category =
"🖼️ Image Object";

living =
"❓ Unknown";

emotion =
"🙂 Neutral";

description =
"AI analyzed the uploaded image.";

details =
"This appears to be a cartoon/object/custom image.";

}

result.innerHTML =

`

<h2 style="
font-size:45px;
color:#00ffff;
margin-bottom:25px;
">

🔥 AI Analysis Result

</h2>

<div style="
background:rgba(0,255,255,0.12);
padding:25px;
border-radius:20px;
border:2px solid cyan;
text-align:left;
line-height:2.3;
font-size:22px;
color:white;
">

<p>📂 File Name:
<b>${file.name}</b></p>

<p>📌 Category:
<b>${category}</b></p>

<p>🌍 Living Status:
<b>${living}</b></p>

<p>😊 Emotion:
<b>${emotion}</b></p>

<p>💡 Description:
<b>${description}</b></p>

<p>📘 Detailed Analysis:
<b>${details}</b></p>

<p>⚡ AI Recognition:
<b>Successful</b></p>

</div>

`;

result.scrollIntoView({

behavior:"smooth"

});

},1500);

};

});

</script>
